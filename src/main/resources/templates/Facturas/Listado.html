<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Facturas</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">Inicio</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" aria-current="page" href="/listadoPropiedades">Propiedades</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/publicaciones">Publicaciones</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">Pricing</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" aria-disabled="true"href="/facturas">Facturas</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container">
		<h1>Listado de facturas</h1>

		<p style="color: green;" th:text="${exito}"></p>
		<p style="color: red;" th:text="${error}"></p>

		<a href="/facturas/nueva">Nueva factura</a>

		<br><br>

		<table border="1">
			<thead>
				<tr>
					<th>ID</th>
					<th>Contrato</th>
					<th>Concepto</th>
					<th>Fecha emisión</th>
					<th>Fecha vencimiento</th>
					<th>Importe</th>
					<th>Estado</th>
					<th>Medio pago</th>
					<th>Importe pagado</th>
					<th>Acciones</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="factura : ${facturas}">
					<td th:text="${factura.id}"></td>
					<td th:text="${factura.contrato.id}"></td>
					<td th:text="${factura.conceptoFacturado}"></td>
					<td th:text="${factura.fechaEmision}"></td>
					<td th:text="${factura.fechaVencimiento}"></td>
					<td th:text="${factura.importe}"></td>
					<td th:text="${factura.estadoFactura}"></td>
					<td th:text="${factura.medioPago}"></td>
					<td th:text="${factura.importePagado}"></td>
					<td>
						<a th:href="@{/facturas/editar/{id}(id=${factura.id})}">Editar</a>
						|
						<a th:href="@{/facturas/eliminar/{id}(id=${factura.id})}"
							onclick="return confirm('¿Seguro que desea eliminar esta factura?')">
							Eliminar
						</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

</body>

</html>
