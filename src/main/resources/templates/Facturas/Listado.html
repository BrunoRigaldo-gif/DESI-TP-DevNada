<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de facturas</title>
</head>
<body>

<h1>Listado de facturas</h1>

<p style="color: green;" th:text="${mensaje}"></p>
<p style="color: red;" th:text="${error}"></p>

<a href="/facturas/nueva">Nueva factura</a>

<br><br>

<form th:action="@{/facturas}" method="get">

    <label>Contrato:</label>
    <select name="contratoId">
        <option value="">Todos</option>
        <option th:each="contrato : ${contratos}"
                th:value="${contrato.id}"
                th:text="'Contrato #' + ${contrato.id}">
        </option>
    </select>

    <label>Estado:</label>
    <select name="estado">
        <option value="">Todos</option>
        <option value="pendiente">Pendiente</option>
        <option value="pagada">Pagada</option>
        <option value="vencida">Vencida</option>
        <option value="anulada">Anulada</option>
    </select>

    <label>Vencimiento desde:</label>
    <input type="date" name="fechaDesde">

    <label>Vencimiento hasta:</label>
    <input type="date" name="fechaHasta">

    <button type="submit">Filtrar</button>
    <a href="/facturas">Limpiar</a>

</form>

<br>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Contrato</th>
            <th>Concepto</th>
            <th>Fecha emisión</th>
            <th>Fecha vencimiento</th>
            <th>Importe</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="factura : ${facturas}">
            <td th:text="${factura.id}"></td>
            <td th:text="${factura.contrato != null ? 'Contrato #' + factura.contrato.id : 'Sin contrato'}"></td>
            <td th:text="${factura.conceptoFacturado}"></td>
            <td th:text="${factura.fechaEmision}"></td>
            <td th:text="${factura.fechaVencimiento}"></td>
            <td th:text="${factura.importe}"></td>
            <td th:text="${factura.estadoFactura}"></td>
            <td>
                <a th:href="@{/facturas/editar/{id}(id=${factura.id})}">Editar</a>
                |
                <a th:href="@{/facturas/eliminar/{id}(id=${factura.id})}"
                   onclick="return confirm('¿Seguro que desea eliminar esta factura?')">
                   Eliminar
                </a>
            </td>
        </tr>
    </tbody>
</table>

<br>

<a href="/">Volver al inicio</a>

</body>
</html>
