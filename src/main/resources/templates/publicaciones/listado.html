<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<title>Gestión de Publicaciones</title>
</head>

<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">Inicio</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" aria-current="page" href="/listadoPropiedades">Propiedades</a>
					</li>
					<li class="nav-item active">
						<a class="nav-link" href="/publicaciones">Publicaciones</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="#">Pricing</a>
					</li>
					<li class="nav-item">
						<a class="nav-link disabled" aria-disabled="true">Disabled</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container">
		<h1>Listado de Publicaciones</h1>

		<a th:href="@{/publicaciones/nueva}">+ Crear Nueva Publicación</a>
		<br><br>

		<table border="1">
			<thead>
				<tr>
					<th>ID</th>
					<th>Título</th>
					<th>Tipo</th>
					<th>Estado</th>
					<th>Precio</th>
					<th>Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="publi : ${publicaciones}">
					<td th:text="${publi.id}"></td>
					<td th:text="${publi.titulo}"></td>
					<td th:text="${publi.tipoPublicacion}"></td>
					<td th:text="${publi.estadoPublicacion}"></td>
					<td th:text="${publi.precioAlquiler}"></td>
					<td>
						<a th:href="@{/publicaciones/editar/{id}(id=${publi.id})}">✏️ Editar</a>
						&nbsp;&nbsp;
						<a th:href="@{/publicaciones/eliminar/{id}(id=${publi.id})}"
							onclick="return confirm('¿Estás seguro de que querés eliminar esta publicación?');">
							🗑️ Eliminar
						</a>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>

</html>
