<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${publicacion.id != null} ? 'Editar Publicación' : 'Nueva Publicación'">Nueva Publicación</title>
    </head>
<body>
    <div class="container mt-4">
        
        <h2 th:text="${publicacion.id != null} ? 'Editar Publicación' : 'Nueva Publicación'">Nueva Publicación</h2>
        
        <form th:action="@{/publicaciones/guardar}" th:object="${publicacion}" method="post" class="needs-validation">
            
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="titulo" class="form-label">Título de la Publicación:</label>
                <input type="text" id="titulo" th:field="*{titulo}" class="form-select" required placeholder="Ej: Hermoso departamento céntrico" />
            </div>

            <div class="mb-3">
                <label for="propiedad" class="form-label">Seleccionar Propiedad Vinculada:</label>
                <select id="propiedad" th:field="*{propiedad}" class="form-select" required>
                    <option value="">-- Seleccione una Propiedad Disponible --</option>
                    <option th:each="prop : ${listaPropiedades}" 
                            th:value="${prop.id}" 
                            th:text="${prop.direccion + ' (' + prop.ciudad?.nombre + ')'}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label for="precio" class="form-label">Precio del Alquiler / Venta ($):</label>
                <input type="number" id="precio" th:field="*{precioAlquiler}" class="form-select" min="1" step="any" required placeholder="0.00" />
            </div>

            <div class="mb-3">
                <label for="condiciones" class="form-label">Condiciones (ej: Mes de depósito, garantes):</label>
                <textarea id="condiciones" th:field="*{condiciones}" class="form-select" rows="3" placeholder="Escriba las condiciones de contratación..."></textarea>
            </div>

            <div class="mb-3">
                <label for="tipoPublicacion" class="form-label">Tipo de Operación:</label>
                <select id="tipoPublicacion" th:field="*{tipoPublicacion}" class="form-select" required>
                    <option value="ALQUILER">Alquiler Tradicional</option>
                    <option value="TEMPORARIO">Alquiler Temporario</option>
                    <option value="VENTA">Venta</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="estadoPublicacion" class="form-label">Estado de la Publicación:</label>
                <select id="estadoPublicacion" th:field="*{estadoPublicacion}" class="form-select" required>
                    <option value="ACTIVA">Activa</option>
                    <option value="PAUSADA">Pausada</option>
                    <option value="FINALIZADA">Finalizada</option>
                </select>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success">Guardar Publicación</button>
                <a th:href="@{/publicaciones/listar}" class="btn btn-danger">Cancelar</a>
            </div>

        </form>
    </div>
</body>
</html>
