<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Gestión de Contrato</title>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<nav class="navbar navbar-expand-lg bg-body-tertiary">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">Inicio</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" href="/listadoPropiedades">Propiedades</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/publicaciones">Publicaciones</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" aria-current="page" href="/contratos">Contratos</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" href="/facturas">Facturas</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<br>
	<div class="container">
		<div class="row">
			<div class="col-6 container justify-content-center card">
				<br>
				<h1 class="text-center"
					th:text="${contrato.id == null ? 'Alta de Contrato' : 'Modificación de Contrato'}">Alta de Contrato
				</h1>
				<div class="card-body">
					<form class="input-group-text-sm" th:action="@{/contratos/guardar}" th:object="${contrato}"
						method="POST">
						<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
						<input type="hidden" th:field="*{id}" />
						<div>
							<span>Propiedad:</span>
							<select class="form-select" th:field="*{propiedad.id}" aria-label="Seleccionar propiedad"
								required>
								<option value="" disabled selected>Despliegue este menú...</option>
								<option th:each="p : ${propiedades}" th:value="${p.id}" th:text="${p.direccion}">
								</option>
							</select>
						</div>
						<div>
							<span>Inquilino:</span>
							<select class="form-select" th:field="*{inquilino.id}" aria-label="Seleccionar inquilino"
								required>
								<option value="" disabled selected>Despliegue este menú...</option>
								<option th:each="i : ${inquilinos}" th:value="${i.id}"
									th:text="${i.apellido + ', ' + i.nombre + ' - ' + i.dniCuit}"></option>
							</select>
						</div>
						<div>
							<span>Fecha de Inicio:</span>
							<input type="date" class="form-control" th:field="*{fechaInicio}" required>
						</div>
						<div>
							<span>Duración (meses):</span>
							<input type="number" min="1" class="form-control" th:field="*{duracionMeses}"
								placeholder="Cantidad de meses" required>
						</div>
						<div>
							<span>Importe Mensual:</span>
							<input type="number" step="0.01" min="0" class="form-control" th:field="*{importeMensual}"
								placeholder="Importe del alquiler" required>
						</div>
						<div>
							<span>Día de Vencimiento Mensual:</span>
							<input type="number" min="1" max="31" class="form-control" th:field="*{diaVencimientoMensual}"
								placeholder="Día del mes (1 a 31)" required>
						</div>
						<div>
							<span>Descripción:</span>
							<input type="text" class="form-control" th:field="*{descripcion}"
								placeholder="Descripción del contrato" required>
						</div>
						<div>
							<span>Estado:</span>
							<select class="form-select" th:field="*{estadoContrato}" aria-label="Seleccionar estado">
								<option value="borrador">Borrador</option>
								<option value="activo">Activo</option>
								<option value="finalizado">Finalizado</option>
								<option value="rescindido">Rescindido</option>
							</select>
						</div>
						<br>
						<div class="box-footer">
							<button type="submit" class="btn btn-outline-secondary">Guardar</button>
							<a type="button" class="btn btn-outline-secondary" href="/contratos">Cancelar</a>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
